<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Biblioteca de las Sombras — Inicio</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cinzel:wght@400;600&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1008;
    --parchment: #f5ede0;
    --gold: #c9a84c;
    --gold-light: #e8c97a;
    --rust: #8b3a2a;
    --shadow: #2d1a0e;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background-color: #0d0804;
    color: var(--parchment);
    font-family: 'Cormorant Garamond', serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    align-items: center;
    overflow-x: hidden;
    padding: 2rem;
  }

  /* Fondo con grano/ruido sutil */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 9999; opacity: 0.35;
  }

  /* Brillo central de fondo */
  .bg-glow {
    position: absolute;
    top: 30%; left: 50%;
    transform: translate(-50%, -50%);
    width: 600px; height: 600px;
    background: radial-gradient(circle, #2a1206 0%, transparent 70%);
    z-index: 0;
    pointer-events: none;
    opacity: 0.6;
  }

  /* Contenedor Principal */
  main {
    text-align: center;
    max-width: 600px;
    margin: auto;
    z-index: 1;
    position: relative;
  }

  .site-subtitle {
    font-family: 'IM Fell English', serif;
    font-style: italic;
    font-size: clamp(1rem, 2.5vw, 1.3rem);
    color: rgba(245,237,224,0.4);
    letter-spacing: 0.1em;
    margin-bottom: 0.5rem;
  }

  .site-title {
    font-family: 'Cinzel', serif;
    font-size: clamp(2.2rem, 5vw, 4rem);
    font-weight: 400;
    letter-spacing: 0.15em;
    line-height: 1.2;
    color: var(--gold);
    text-shadow: 0 0 40px rgba(201,168,76,0.2);
  }

  .divider {
    width: 120px; height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 2rem auto;
    position: relative;
  }
  .divider::after {
    content: '✦';
    position: absolute; top: -9px; left: 50%; transform: translateX(-50%);
    color: var(--gold); font-size: 0.7rem;
  }

  .intro-text {
    font-size: clamp(1.1rem, 2vw, 1.25rem);
    line-height: 1.8;
    color: rgba(245,237,224,0.7);
    font-weight: 300;
    margin-bottom: 3.5rem;
  }

  /* BOTÓN DE CONEXIÓN */
  .enter-btn {
    display: inline-block;
    font-family: 'Cinzel', serif;
    font-size: 0.8rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--gold);
    text-decoration: none;
    padding: 1.2rem 2.5rem;
    border: 1px solid rgba(201,168,76,0.3);
    background: rgba(201,168,76,0.02);
    position: relative;
    transition: all 0.4s ease;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
  }

  .enter-btn:hover {
    color: var(--parchment);
    border-color: var(--gold);
    background: rgba(201,168,76,0.08);
    transform: translateY(-2px);
    box-shadow: 0 15px 40px rgba(201,168,76,0.1);
  }

  /* Footer */
  footer {
    font-family: 'Cinzel', serif;
    font-size: 0.55rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: rgba(201,168,76,0.2);
    z-index: 1;
    margin-top: 2rem;
  }
</style>
</head>
<body>

<div class="bg-glow"></div>

<main>
  <p class="site-subtitle">— Manuscritos Nocturnos —</p>
  <h1 class="site-title">Antología<br>Personal</h1>
  
  <div class="divider"></div>
  
  <p class="intro-text">
    Bienvenido a este rincón de silencios compartidos. Un espacio dedicado a la literatura, los fragmentos perdidos y los debates con la inteligencia artificial.
  </p>

  <a href="amor.html" class="enter-btn">
    Entrar a la Colección ✦
  </a>
</main>

<footer>
  <p>© 2026 · Edición Digital Móvil</p>
</footer>

</body>
</html>
